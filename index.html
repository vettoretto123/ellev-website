<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOICE – Unlock Your Art</title>
  <meta name="description" content="Percorso di trasformazione per cantanti e artisti." />
  <style>
    /* ─── PALETTE ───────────────────────────────────────────────
       Deep Ink        #0D0D0D   sfondo
       Obsidian        #181818   card / bottoni
       Gold Leaf       #C9A84C   accento caldo
       Electric Fuchsia#E040FB   accento creativo
       Vivid Teal      #00E5C0   accento fresco
       Soft Ivory      #F5F0E8   testo
       Mid Gray        #888888   testo secondario
    ──────────────────────────────────────────────────────────── */
    :root {
      --ink:      #0D0D0D;
      --obsidian: #181818;
      --gold:     #C9A84C;
      --fuchsia:  #E040FB;
      --teal:     #00E5C0;
      --ivory:    #F5F0E8;
      --gray:     #888888;
      --border:   rgba(201,168,76,0.2);

      /* Font stack senza Google Fonts — system fonts eleganti */
      --font-display: 'Georgia', 'Times New Roman', serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono:    'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--ivory);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── AMBIENT ORBS ── */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 480px; height: 480px; background: var(--fuchsia); top: -160px;  left: -160px; animation-delay: 0s; }
    .orb-2 { width: 360px; height: 360px; background: var(--teal);    bottom:-100px; right: -100px; animation-delay: -5s; }
    .orb-3 { width: 260px; height: 260px; background: var(--gold);    top: 50%;  left: 55%;    animation-delay: -9s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(50px, 35px) scale(1.1); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 3.5rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 2rem;
      animation: fadeUp 0.8s ease both;
    }
    .logo-wrap img {
      width: min(260px, 65vw);
      height: auto;
      display: block;
    }
    /* Fallback se il logo non c'è ancora */
    .logo-wrap img[data-missing="true"] {
      display: none;
    }
    .logo-fallback {
      display: none;
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--ivory);
    }
    .logo-fallback span { color: var(--gold); }

    /* ── PROFILO TEXT ── */
    .profile-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ivory);
      margin-bottom: 0.3rem;
      animation: fadeUp 0.8s 0.1s ease both;
    }
    .profile-sub {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      animation: fadeUp 0.8s 0.15s ease both;
    }
    .profile-desc {
      font-size: 0.9rem;
      color: var(--gray);
      text-align: center;
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--fuchsia));
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    /* ── LINKS LIST ── */
    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    /* ── LINK BUTTON ── */
    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem 1.4rem;
      background: var(--obsidian);
      border: 1px solid var(--border);
      color: var(--ivory);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: border-color 0.22s, background 0.22s, transform 0.18s, box-shadow 0.22s;
      position: relative;
      overflow: hidden;
      /* parallelogram effect */
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(201,168,76,0.06), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .link-btn:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    /* Highlighted button */
    .link-btn.highlighted {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    }
    .link-btn.highlighted:hover {
      background: var(--fuchsia);
      border-color: var(--fuchsia);
      color: #fff;
      box-shadow: 0 8px 32px rgba(224,64,251,0.35);
    }
    .link-btn.highlighted .link-icon svg { fill: var(--ink); }
    .link-btn.highlighted:hover .link-icon svg { fill: #fff; }

    /* ── ICON ── */
    .link-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--gold);
      transition: fill 0.2s;
    }
    .link-btn:not(.highlighted):hover .link-icon svg { fill: var(--ivory); }

    .link-label { flex: 1; }

    .link-arrow {
      opacity: 0.4;
      font-size: 0.8rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    .link-btn:hover .link-arrow { opacity: 0.8; transform: translateX(3px); }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      color: var(--gray);
      letter-spacing: 0.08em;
      text-align: center;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stagger child links */
    .link-item { animation: fadeUp 0.6s ease both; }

    /* ── ERROR STATE ── */
    .error-msg {
      background: rgba(224,64,251,0.08);
      border: 1px solid rgba(224,64,251,0.3);
      color: var(--fuchsia);
      padding: 1rem 1.4rem;
      font-size: 0.82rem;
      line-height: 1.6;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="wrapper" id="app">
    <!-- Contenuto iniettato da JS -->
    <noscript>
      <p style="color:var(--gray);text-align:center;">Abilita JavaScript per visualizzare i link.</p>
    </noscript>
  </main>

    };

    // ─── RENDER ────────────────────────────────────────────────────
    async function init() {
      const app = document.getElementById('app');

      let config;
      try {
        const res = await fetch('links.json');
        if (!res.ok) throw new Error('File non trovato');
        config = await res.json();
      } catch (e) {
        app.innerHTML = `<div class="error-msg">
          ⚠️ Impossibile caricare <code>links.json</code>.<br>
          Assicurati di aprire la pagina tramite un server locale o su Netlify,<br>
          non direttamente dal filesystem (file://).
        </div>`;
        return;
      }

      const { profilo, link, footer } = config;

      // ── LOGO ──
      const logoWrap = document.createElement('div');
      logoWrap.className = 'logo-wrap';
      const img = document.createElement('img');
      img.src = profilo.logo;
      img.alt = profilo.nome;
      img.onerror = function() {
        this.style.display = 'none';
        document.querySelector('.logo-fallback').style.display = 'block';
      };
      logoWrap.appendChild(img);
      app.appendChild(logoWrap);

      // Logo fallback testo
      const fallback = document.createElement('div');
      fallback.className = 'logo-fallback';
      fallback.innerHTML = `V<span>O</span>ICE`;
      app.appendChild(fallback);

      // ── PROFILO TEXT ──
      if (profilo.nome) {
        const name = document.createElement('p');
        name.className = 'profile-name';
        name.textContent = profilo.nome;
        app.appendChild(name);
      }
      if (profilo.sottotitolo) {
        const sub = document.createElement('p');
        sub.className = 'profile-sub';
        sub.textContent = profilo.sottotitolo;
        app.appendChild(sub);
      }
      if (profilo.descrizione) {
        const desc = document.createElement('p');
        desc.className = 'profile-desc';
        desc.textContent = profilo.descrizione;
        app.appendChild(desc);
      }

      // ── DIVIDER ──
      const div = document.createElement('div');
      div.className = 'divider';
      app.appendChild(div);

      // ── LINKS ──
      const list = document.createElement('div');
      list.className = 'links-list';

      const attivi = link.filter(l => l.attivo);
      attivi.forEach((item, i) => {
        const a = document.createElement('a');
        a.href = item.url;
        a.className = 'link-btn link-item' + (item.evidenziato ? ' highlighted' : '');
        a.target = item.url.startsWith('mailto') ? '_self' : '_blank';
        a.rel = 'noopener noreferrer';
        a.style.animationDelay = `${0.3 + i * 0.07}s`;

        const iconSvg = ICONS[item.icona] || ICONS['website'];
        a.innerHTML = `
          <span class="link-icon">${iconSvg}</span>
          <span class="link-label">${item.etichetta}</span>
          <span class="link-arrow">→</span>
        `;
        list.appendChild(a);
      });

      app.appendChild(list);

      // ── FOOTER ──
      if (footer) {
        const ft = document.createElement('p');
        ft.className = 'page-footer';
        ft.textContent = footer;
        app.appendChild(ft);
      }
    }

    init();
  </script>
</body>
</html>
