name: Deploy Production to Netlify

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Conferma deploy in produzione'
        required: true
        type: boolean
        default: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ENVIRONMENT: production

      - name: Deploy to Netlify Production
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '_site'
          production-deploy: true
          production-branch: main
          deploy-message: "Deploy Production - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PROD_NETLIFY_SITE_ID }}
        timeout-minutes: 5
