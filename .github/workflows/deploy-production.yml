name: Deploy Production to Netlify

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Conferma deploy in produzione'
        required: true
        type: boolean
        default: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Netlify Production
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-deploy: true
          deploy-message: "Deploy Production - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PROD_NETLIFY_SITE_ID }}
        timeout-minutes: 5
